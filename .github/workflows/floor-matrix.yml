# Unity floor matrix — proves the Editor C# compiles + its EditMode tests pass on every supported LTS.
# (Verifies the "old-Unity compatible" claim — that the COMPATIBILITY.md guards are correct on each floor.)
#
# STATUS: LIVE-READY. Host projects committed (ci/unity-host-<version>/) and the three repo secrets are set
# (UNITY_LICENSE = the Personal .ulf, UNITY_EMAIL, UNITY_PASSWORD — GameCI activates Personal from these,
# since Unity deprecated offline/manual activation for Personal). Fires on push to the working branch below.
# After the first green run, switch to the release/PR gates and drop the broad branch trigger.

name: floor-matrix

on:
  workflow_dispatch:
  # First-run trigger: fire on push to the working branch. (workflow_dispatch alone won't work until the
  # workflow reaches the DEFAULT branch — a GitHub limitation — so a branch-scoped push trigger is used.)
  push:
    branches: [quality/protocol-contract-foundation]
  # After the first green run, switch to gating releases/PRs (and remove the branch trigger above):
  # pull_request:
  #   paths: ['unity-editor-mcp/**']

jobs:
  editmode:
    name: EditMode @ Unity ${{ matrix.unity }}
    runs-on: ubuntu-latest
    # Only runs where the Unity license secrets exist (the canonical repo), so forks skip.
    if: ${{ github.repository == 'burakaydinofficial/unity-editor-mcp' }}
    strategy:
      fail-fast: false
      matrix:
        unity:
          - 2020.3.49f1
          - 2021.3.45f2
          - 2022.3.62f2
          # - 6000.0.34f1   # add once a Unity 6 host project exists
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ci/unity-host-${{ matrix.unity }}/Library
          key: Library-${{ matrix.unity }}-${{ hashFiles('unity-editor-mcp/**') }}
          restore-keys: |
            Library-${{ matrix.unity }}-

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: ${{ matrix.unity }}
          # Minimal host that references the package via file: + testables (ci/unity-host-<version>/).
          projectPath: ci/unity-host-${{ matrix.unity }}
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode ${{ matrix.unity }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-results-${{ matrix.unity }}
          path: artifacts
