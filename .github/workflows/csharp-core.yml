name: Core (C#)

# Verifies the Unity-INDEPENDENT core of the bridge (framing, dispatch, the
# result/error contract) with plain `dotnet test`. No Unity, no license — the
# Core asmdef has noEngineReferences, so this is the same source the editor
# compiles. The Unity-coupled handlers are verified in-editor separately.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core-test:
    name: Unity-independent Core (dotnet test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Test Core
        run: dotnet test --nologo
        working-directory: ./dotnet/UnityEditorMCP.Core.Tests
